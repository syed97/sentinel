[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand here on purpose: the Dockerfile CMD (`sh -c "uvicorn ... --port
# ${PORT:-8000}"`) starts the API and expands $PORT via a shell. Migrations are a
# separate one-time step (`alembic upgrade head` in the Railway shell), NOT run on
# boot, so a lock-blocked migration can never hang the service / fail healthcheck.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
